name: Sync Notion Docs

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: npm install @notionhq/client notion-to-md

      - name: Export Notion page
        run: |
          node <<EOF
          const { Client } = require("@notionhq/client");
          const { NotionToMarkdown } = require("notion-to-md");
          const fs = require("fs");

          const notion = new Client({ auth: process.env.NOTION_TOKEN });
          const n2m = new NotionToMarkdown({ notionClient: notion });

          async function run() {
            const mdblocks = await n2m.pageToMarkdown(process.env.NOTION_PAGE_ID);
            const mdString = n2m.toMarkdownString(mdblocks);
            fs.writeFileSync("docs/rescue-link.md", mdString.parent);
          }

          run();
          EOF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}

      - name: Commit docs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync docs from Notion"
            git push
          fi
